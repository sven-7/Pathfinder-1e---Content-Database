<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PF1e — Campaigns</title>
<link rel="stylesheet" href="/static/css/parchment.css">
<style>
/* ── Campaign-specific styles ─────────────────────── */
.banner-nav {
  position: absolute;
  top: 50%;
  left: 20px;
  transform: translateY(-50%);
  display: flex;
  gap: 8px;
}
.banner-nav .banner-link {
  position: static;
  transform: none;
}

.campaign-card {
  border: 1px solid var(--gold-border);
  background: var(--paper-mid);
  padding: 16px 20px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 10px;
}
.campaign-card:hover {
  border-color: var(--gold);
  background: var(--gold-bg);
}
.campaign-card-name {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
}
.campaign-card-meta {
  font-family: var(--font-label);
  font-size: 10px;
  color: var(--fade);
  letter-spacing: .04em;
  margin-top: 4px;
}

.party-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.party-card {
  border: 1px solid var(--gold-border);
  background: var(--paper-mid);
  padding: 14px 16px;
  position: relative;
}
.party-card-name {
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 2px;
}
.party-card-class {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--fade);
  margin-bottom: 8px;
}
.party-card-player {
  font-family: var(--font-label);
  font-size: 9px;
  color: var(--fade);
  letter-spacing: .04em;
  margin-bottom: 6px;
}
.party-stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-top: 8px;
}
.party-stat {
  text-align: center;
  background: var(--paper);
  border: 1px solid var(--gold-border);
  padding: 4px 2px;
}
.party-stat-label {
  font-family: var(--font-label);
  font-size: 7px;
  letter-spacing: .06em;
  color: var(--fade);
  text-transform: uppercase;
}
.party-stat-value {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
}
.party-card-actions {
  margin-top: 10px;
  display: flex;
  gap: 6px;
}

.member-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid rgba(184,134,11,0.12);
}
.member-row:last-child { border-bottom: none; }
.member-name {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
}
.member-role {
  font-family: var(--font-label);
  font-size: 9px;
  color: var(--gold);
  letter-spacing: .06em;
  text-transform: uppercase;
}

.add-form {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  margin-top: 12px;
}
.add-form .field-input {
  flex: 1;
  max-width: 240px;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--fade);
  font-family: var(--font-body);
  font-size: 15px;
}

.back-link {
  font-family: var(--font-label);
  font-size: 10px;
  color: var(--gold);
  letter-spacing: .06em;
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
  margin-bottom: 12px;
  display: inline-block;
}
.back-link:hover { color: var(--gold-light); text-decoration: underline; }

.error-msg {
  font-family: var(--font-label);
  font-size: 10px;
  color: var(--red-wax);
  letter-spacing: .04em;
  margin-top: 4px;
}
.success-msg {
  font-family: var(--font-label);
  font-size: 10px;
  color: var(--green);
  letter-spacing: .04em;
  margin-top: 4px;
}

.loading-msg {
  text-align: center;
  padding: 40px;
  color: var(--fade);
  font-family: var(--font-label);
  font-size: 11px;
  letter-spacing: .06em;
}
.spinner {
  display: inline-block;
  width: 24px; height: 24px;
  border: 3px solid var(--gold-border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="top-banner">
  <div class="banner-nav">
    <a class="banner-link" href="/">Character Creator</a>
  </div>
  <div class="banner-title"><span>&#x1F5FA;</span> Campaigns</div>
  <div class="banner-sub">Pathfinder 1st Edition · Campaign Management</div>
  <button class="banner-link" style="cursor:pointer;border:none;background:none;" onclick="signOut()">Sign Out</button>
</div>

<div class="app-shell">
  <div id="app-content">
    <div class="loading-msg"><div class="spinner"></div><br>Loading...</div>
  </div>
</div>

<script src="/static/js/campaign.js"></script>
</body>
</html>
