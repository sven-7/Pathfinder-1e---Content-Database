services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pf1e_users
      POSTGRES_USER: pf1e
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pf1e"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      # Override localhost → db service name inside Docker network
      DATABASE_URL: postgresql+asyncpg://pf1e:${PG_PASSWORD:-pf1epass}@db:5432/pf1e_users
      CONTENT_DATABASE_URL: postgresql://pf1e:${PG_PASSWORD:-pf1epass}@db:5432/pf1e_users
      HOST: "0.0.0.0"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db:/app/db            # SQLite content DB (read-only reference)
      - ./characters:/app/characters  # legacy JSON files for migration

volumes:
  pg_data:
